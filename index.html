<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title><!DOCTYPE html>
        <html lang="ko">
        <head>
          <meta charset="UTF-8" />
            <link rel="icon" type="image/svg+xml" href="/vite.svg" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>AI Multi-Agent Meeting Room</title>
                  <!-- Modern Fonts -->
                    <link rel="preconnect" href="https://fonts.googleapis.com">
                      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
                        <!-- FontAwesome for icons -->
                          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
                          </head>
                          <body>
                            <div id="app">
                                <!-- Header -->
                                    <header class="soft-header">
                                          <div class="header-left">
                                                  <div class="logo-box">
                                                            <i class="fa-solid fa-gamepad"></i>
                                                                    </div>
                                                                            <div class="title-container">
                                                                                      <h1 class="main-title">AI <span>MEETING ROOM</span></h1>
                                                                                                <span class="version-badge">v2.0 NEXT-GEN</span>
                                                                                                        </div>
                                                                                                              </div>
                                                                                                                    <div class="header-right">
                                                                                                                            <div class="status-indicator">
                                                                                                                                      <div class="pulse-dot"></div>
                                                                                                                                                <span class="status-text">System Online</span>
                                                                                                                                                        </div>
                                                                                                                                                                <button class="icon-btn" aria-label="Settings" id="btn-settings">
                                                                                                                                                                          <i class="fa-solid fa-gear"></i>
                                                                                                                                                                                  </button>
                                                                                                                                                                                        </div>
                                                                                                                                                                                            </header>
                                                                                                                                                                                            
                                                                                                                                                                                                <!-- Main Content Layout -->
                                                                                                                                                                                                    <main class="dashboard-layout">
                                                                                                                                                                                                          
                                                                                                                                                                                                                <!-- Sidebar / Personas -->
                                                                                                                                                                                                                      <aside class="sidebar soft-panel" id="sidebar">
                                                                                                                                                                                                                              <div class="panel-header">
                                                                                                                                                                                                                                        <h2><i class="fa-solid fa-users-rays"></i> <span>Participants</span></h2>
                                                                                                                                                                                                                                                  <button class="icon-btn sm" id="btn-collapse-sidebar"><i class="fa-solid fa-chevron-left" style="transition: transform 0.3s;"></i></button>
                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                          <div class="agents-container" id="agents-container">
                                                                                                                                                                                                                                                                                    <!-- Agents will be injected by JS -->
                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                  </aside>
                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                        <!-- Center Chat & Control Area -->
                                                                                                                                                                                                                                                                                                              <section class="center-stage">
                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                              <!-- Input & Control Panel -->
                                                                                                                                                                                                                                                                                                                                      <div class="control-panel soft-panel">
                                                                                                                                                                                                                                                                                                                                                <div class="input-header">
                                                                                                                                                                                                                                                                                                                                                            <h3><i class="fa-solid fa-pen-nib"></i> Agenda Input</h3>
                                                                                                                                                                                                                                                                                                                                                                        <div class="input-actions">
                                                                                                                                                                                                                                                                                                                                                                                      <button class="action-btn outline" id="btn-attach"><i class="fa-solid fa-paperclip"></i> Attach</button>
                                                                                                                                                                                                                                                                                                                                                                                                    <input type="file" id="file-input" multiple style="display: none;" accept=".txt,.md,.js,.css,.html,.json">
                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                    <textarea id="agenda-input" class="agenda-textarea" placeholder="Input your ideas..."></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                              <div id="attached-files-container" class="attached-files-container"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="execution-bar">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="step-indicator" id="step-indicator">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <!-- Steps injected by JS -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="primary-actions">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <button class="action-btn danger" id="btn-reset"><i class="fa-solid fa-rotate-left"></i> Reset</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="action-btn primary glow" id="btn-start"><i class="fa-solid fa-bolt"></i> Start Meeting</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <!-- Chat / Results Log -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="meeting-log soft-panel">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="panel-header">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h2><i class="fa-solid fa-comments"></i> Real-time Log</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="log-actions">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <button class="icon-btn sm" id="btn-download-log" title="Download Log"><i class="fa-solid fa-download"></i></button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="icon-btn sm" id="btn-expand-log" title="Expand"><i class="fa-solid fa-expand"></i></button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="chat-container" id="chat-container">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- Messages injected by JS -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="welcome-message">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <i class="fa-brands fa-hubspot"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p>Welcome message placeholder</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </section>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <!-- Right Panel / Summary -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <aside class="summary-panel soft-panel">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="panel-header">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <h2><i class="fa-solid fa-chart-pie"></i> Summary</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="summary-content" id="summary-content">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="empty-state">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <i class="fa-solid fa-hourglass-empty"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p>Summary will appear here.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="master-action">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="action-btn master-btn disabled" id="btn-summary" disabled>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <i class="fa-solid fa-crown"></i> Final Decision
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="action-btn result-btn" id="btn-show-result" style="display:none;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <i class="fa-solid fa-scroll"></i> Show Result
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </aside>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- Result Modal -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="result-modal-overlay hidden" id="result-modal">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="result-modal soft-panel">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="result-modal-header panel-header">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h2><i class="fa-solid fa-crown"></i> Result Summary</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <button class="icon-btn sm" id="btn-close-result">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <i class="fa-solid fa-xmark"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="result-modal-body" id="result-content">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="empty-state">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <i class="fa-solid fa-hourglass-empty"></i>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <p>Loading results...</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </main>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <!-- Settings Modal -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="modal-overlay hidden" id="settings-modal">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="modal soft-panel">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="modal-header panel-header">
