<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Meeting Room</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
              </head>
              <body>
                <div id="app">
                    <header class="soft-header">
                          <div class="header-left">
                                  <div class="logo-box"><i class="fa-solid fa-gamepad"></i></div>
                                          <div class="title-container">
                                                    <h1 class="main-title">AI <span>MEETING ROOM</span></h1>
                                                              <span class="version-badge">v2.0 NEXT-GEN</span>
                                                                      </div>
                                                                            </div>
                                                                                  <div class="header-right">
                                                                                          <div class="status-indicator"><div class="pulse-dot"></div><span class="status-text">System Online</span></div>
                                                                                                  <button class="icon-btn" id="btn-settings"><i class="fa-solid fa-gear"></i></button>
                                                                                                        </div>
                                                                                                            </header>
                                                                                                                <main class="dashboard-layout">
                                                                                                                      <aside class="sidebar soft-panel" id="sidebar">
                                                                                                                              <div class="panel-header"><h2><i class="fa-solid fa-users-rays"></i> <span>Agents</span></h2></div>
                                                                                                                                      <div class="agents-container" id="agents-container"></div>
                                                                                                                                            </aside>
                                                                                                                                                  <section class="center-stage">
                                                                                                                                                          <div class="control-panel soft-panel">
                                                                                                                                                                    <div class="input-header"><h3>Input Agenda</h3></div>
                                                                                                                                                                              <textarea id="agenda-input" class="agenda-textarea" placeholder="Enter your agenda here..."></textarea>
                                                                                                                                                                                        <div class="execution-bar">
                                                                                                                                                                                                    <div id="step-indicator"></div>
                                                                                                                                                                                                                <div class="primary-actions">
                                                                                                                                                                                                                              <button id="btn-reset">Reset</button>
                                                                                                                                                                                                                                            <button id="btn-start">Start Meeting</button>
                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                  <div class="meeting-log soft-panel">
                                                                                                                                                                                                                                                                                            <div class="panel-header"><h2>Meeting Log</h2></div>
                                                                                                                                                                                                                                                                                                      <div class="chat-container" id="chat-container"></div>
                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                    </section>
                                                                                                                                                                                                                                                                                                                          <aside class="summary-panel soft-panel">
                                                                                                                                                                                                                                                                                                                                  <div class="panel-header"><h2>Summary</h2></div>
                                                                                                                                                                                                                                                                                                                                          <div id="summary-content"></div>
                                                                                                                                                                                                                                                                                                                                                  <button id="btn-summary">Director Decision</button>
                                                                                                                                                                                                                                                                                                                                                        </aside>
                                                                                                                                                                                                                                                                                                                                                            </main>
                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                <script type="module" src="/src/main.js"></script>
                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                </html>
