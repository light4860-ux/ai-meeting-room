<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Multi-Agent Meeting Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="app">
    <header class="soft-header">
      <div class="header-left">
        <div class="logo-box">
          <i class="fa-solid fa-gamepad"></i>
        </div>
        <div class="title-container">
          <h1 class="main-title">AI <span>MEETING ROOM</span></h1>
          <span class="version-badge">v2.0 NEXT-GEN</span>
        </div>
      </div>
      <div class="header-right">
        <div id="attached-files-container" class="file-tags"></div>
        <button id="btn-attach" class="icon-btn" title="Attach Files">
          <i class="fa-solid fa-paperclip"></i>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <i class="fa-solid fa-gear"></i>
        </button>
      </div>
    </header>

    <main class="room-layout">
      <section class="left-panel">
        <div class="panel-header">
          <h2><i class="fa-solid fa-users-gear"></i> Expert Agents</h2>
        </div>
        <div id="agents-container" class="agents-grid">
          <!-- Agents will be injected here -->
        </div>
      </section>

      <section class="center-panel">
        <div id="chat-container" class="chat-viewport">
          <div class="welcome-msg">
            <i class="fa-solid fa-comments"></i>
            <p>Ready to start the expert meeting? Enter your agenda below.</p>
          </div>
        </div>
        
        <div class="input-area">
          <div class="input-wrapper">
            <input type="text" id="agenda-input" placeholder="Enter meeting agenda (e.g. Discussing the new feature design...)" autocomplete="off">
            <button id="btn-start" class="primary-btn">
              <i class="fa-solid fa-play"></i> Start Meeting
            </button>
            <button id="btn-reset" class="secondary-btn" title="Reset">
              <i class="fa-solid fa-rotate-right"></i>
            </button>
          </div>
        </div>
      </section>

      <section class="right-panel">
        <div class="panel-header">
          <h2><i class="fa-solid fa-file-invoice"></i> Live Summary</h2>
          <button id="btn-summary" class="mini-btn">Full Report</button>
        </div>
        <div id="summary-content" class="summary-body">
          <div class="empty-state">Waiting for meeting to start...</div>
        </div>
      </section>
    </main>
  </div>

  <!-- Hidden File Input -->
  <input type="file" id="file-input" multiple style="display: none;">

  <!-- Modals -->
  <div id="settings-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fa-solid fa-gears"></i> Project Settings</h3>
        <button class="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Gemini API Key</label>
          <input type="password" id="api-key-input" placeholder="Enter your API key">
        </div>
        <div class="form-group">
          <label>Model Selection</label>
          <select id="model-select">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Deep Reasoning)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-save-modal" class="primary-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <div id="result-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content wide">
      <div class="modal-header">
        <h3><i class="fa-solid fa-square-poll-vertical"></i> Meeting Report</h3>
        <button id="btn-close-result" class="close-modal">&times;</button>
      </div>
      <div id="result-content" class="modal-body markdown-body">
        <!-- Result content will be injected here -->
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
