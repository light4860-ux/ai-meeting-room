<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 DNF 멀티 에이전트 기획 회의실</title>
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="glass-header">
      <div class="header-left">
        <div class="logo-box">
          <i class="fa-solid fa-gamepad"></i>
        </div>
        <div class="title-container">
          <h1 class="main-title">DNF <span>MEETING ROOM</span></h1>
          <span class="version-badge">v2.0 NEXT-GEN</span>
        </div>
      </div>
      <div class="header-right">
        <div class="status-indicator">
          <div class="pulse-dot"></div>
          <span class="status-text">System Online</span>
        </div>
        <button class="icon-btn" aria-label="Settings" id="btn-settings">
          <i class="fa-solid fa-gear"></i>
        </button>
      </div>
    </header>

    <!-- Main Content Layout -->
    <main class="dashboard-layout">
      
      <!-- Sidebar / Personas -->
      <aside class="sidebar glass-panel">
        <div class="panel-header">
          <h2><i class="fa-solid fa-users-rays"></i> 에이전트 설정</h2>
          <button class="collapse-btn"><i class="fa-solid fa-chevron-left"></i></button>
        </div>
        
        <div class="agents-container" id="agents-container">
          <!-- Agents will be injected by JS -->
        </div>
      </aside>

      <!-- Center Chat & Control Area -->
      <section class="center-stage">
        
        <!-- Input & Control Panel -->
        <div class="control-panel glass-panel">
          <div class="input-header">
            <h3><i class="fa-solid fa-pen-nib"></i> 기획 안건 입력</h3>
            <div class="input-actions">
              <button class="action-btn outline"><i class="fa-solid fa-paperclip"></i> 첨부</button>
            </div>
          </div>
          <textarea id="agenda-input" class="agenda-textarea" placeholder="새로운 업데이트, 밸런스 패치, 또는 이벤트 아이디어를 자유롭게 입력하세요..."></textarea>
          
          <div class="execution-bar">
            <div class="step-indicator" id="step-indicator">
              <!-- Steps injected by JS -->
            </div>
            <div class="primary-actions">
              <button class="action-btn danger" id="btn-reset"><i class="fa-solid fa-rotate-left"></i> 초기화</button>
              <button class="action-btn primary glow" id="btn-start"><i class="fa-solid fa-bolt"></i> 회의 시작</button>
            </div>
          </div>
        </div>

        <!-- Chat / Results Log -->
        <div class="meeting-log glass-panel">
          <div class="panel-header">
            <h2><i class="fa-solid fa-comments"></i> 실시간 회의 로그</h2>
            <div class="log-actions">
              <button class="icon-btn sm"><i class="fa-solid fa-download"></i></button>
              <button class="icon-btn sm"><i class="fa-solid fa-expand"></i></button>
            </div>
          </div>
          <div class="chat-container" id="chat-container">
            <!-- Messages injected by JS -->
            <div class="welcome-message">
              <i class="fa-brands fa-hubspot"></i>
              <p>안건을 입력하고 회의를 시작하면, 에이전트들이 분석을 시작합니다.</p>
            </div>
          </div>
        </div>

      </section>

      <!-- Right Panel / Summary -->
      <aside class="summary-panel glass-panel">
        <div class="panel-header">
          <h2><i class="fa-solid fa-chart-pie"></i> 핵심 요약</h2>
        </div>
        <div class="summary-content" id="summary-content">
          <div class="empty-state">
            <i class="fa-solid fa-hourglass-empty"></i>
            <p>회의가 진행되면 요약이 생성됩니다.</p>
          </div>
        </div>
        
        <div class="master-action">
          <button class="action-btn master-btn disabled" id="btn-summary" disabled>
            <i class="fa-solid fa-crown"></i> 디렉터 최종 판단
          </button>
        </div>
      </aside>

    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay hidden" id="settings-modal">
      <div class="modal glass-panel">
        <div class="modal-header panel-header">
          <h2><i class="fa-solid fa-sliders"></i> 시스템 설정</h2>
          <button class="icon-btn sm" id="btn-close-modal"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>API Key</label>
            <input type="password" class="form-input" placeholder="AIza..." id="api-key-input" />
          </div>
          <div class="form-group">
            <label>모델 선택</label>
            <select class="form-input" id="model-select">
              <option value="gemini-2.5-flash">gemini-2.5-flash (추천)</option>
              <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (저비용)</option>
              <option value="gemini-2.5-pro">gemini-2.5-pro (고성능)</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="action-btn outline" id="btn-cancel-modal">취소</button>
          <button class="action-btn primary" id="btn-save-modal">저장</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
